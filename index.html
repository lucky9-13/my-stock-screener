<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 가치 스크리너</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-600">🚀 저평가 우량주 스크리너</h1>
            <p class="text-gray-600">PER 10 이하, PBR 1 이하 종목 리스트</p>
        </header>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-700">
                    <tr>
                        <th class="p-4 border-b">종목명</th>
                        <th class="p-4 border-b">현재가</th>
                        <th class="p-4 border-b text-red-500">PER</th>
                        <th class="p-4 border-b text-blue-500">PBR</th>
                        <th class="p-4 border-b">시가총액</th>
                    </tr>
                </thead>
                <tbody id="stock-list">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const listContainer = document.getElementById('stock-list');

        async function loadAndFilterStocks() {
            try {
                // 로딩 메시지 표시
                listContainer.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">데이터를 불러오는 중입니다...</td></tr>`;

                // JSON 파일 가져오기
                const response = await fetch('data/stock_data.json');
                if (!response.ok) {
                    throw new Error('데이터를 불러오는데 실패했습니다.');
                }
                const stockData = await response.json();

                // 조건에 맞는 종목 필터링 (PER 0 초과 10 이하, PBR 0 초과 1 이하)
                const filteredStocks = stockData.filter(stock =>
                    stock.per > 0 && stock.per <= 10 &&
                    stock.pbr > 0 && stock.pbr <= 1
                );

                // PER 기준으로 오름차순 정렬 (가장 저평가된 종목이 위로 오도록)
                filteredStocks.sort((a, b) => a.per - b.per);

                // 화면에 렌더링
                listContainer.innerHTML = '';

                if (filteredStocks.length === 0) {
                    listContainer.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">조건에 맞는 종목이 없습니다.</td></tr>`;
                    return;
                }

                // 테이블 헤더 위에 총 종목 수 표시를 위해 헤더 텍스트 수정
                document.querySelector('header p').innerHTML = `PER 10 이하, PBR 1 이하 종목 리스트 <br><span class="text-sm text-green-600 font-semibold">총 ${filteredStocks.length}개의 저평가 우량주가 발견되었습니다!</span>`;

                filteredStocks.forEach((stock, index) => {
                    const formattedPrice = new Intl.NumberFormat('ko-KR').format(stock.price);

                    // 상위 10개 종목은 특별히 배경색과 뱃지로 "강조" 처리
                    const isTop10 = index < 10;
                    const rowBg = isTop10 ? "bg-yellow-50 hover:bg-yellow-100" : "hover:bg-gray-50";
                    const badge = isTop10 ? `<span class="ml-2 px-2 py-1 bg-red-500 text-white text-xs font-bold rounded-full shadow-sm">Top ${index + 1}</span>` : "";

                    const row = `
                        <tr class="${rowBg} transition-colors duration-200">
                            <td class="p-4 border-b font-medium text-gray-800">
                                ${stock.name}
                                <span class="text-xs text-gray-400 ml-1 tracking-tighter">(${stock.code})</span>
                                ${badge}
                            </td>
                            <td class="p-4 border-b text-gray-700 font-semibold">${formattedPrice}원</td>
                            <td class="p-4 border-b text-red-600 font-extrabold">${stock.per.toFixed(2)}</td>
                            <td class="p-4 border-b text-blue-600 font-extrabold">${stock.pbr.toFixed(2)}</td>
                            <td class="p-4 border-b text-sm text-gray-600">${stock.market_cap.toFixed(2)}조</td>
                        </tr>
                    `;
                    listContainer.innerHTML += row;
                });

            } catch (error) {
                console.error('Error fetching stock data:', error);
                listContainer.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">데이터를 불러오는 중 에러가 발생했습니다. 나중에 다시 시도해주세요.</td></tr>`;
            }
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', loadAndFilterStocks);
    </script>
</body>

</html>
