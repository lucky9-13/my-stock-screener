<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 가치 스크리너</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-600">🚀 저평가 우량주 스크리너</h1>
            <p class="text-gray-600">PER 10 이하, PBR 1 이하 종목 리스트</p>
        </header>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-700">
                    <tr>
                        <th class="p-4 border-b w-12 text-center text-gray-500">No.</th>
                        <th class="p-4 border-b">종목명</th>
                        <th class="p-4 border-b text-purple-600 font-bold">총점</th>
                        <th class="p-4 border-b">현재가</th>
                        <th class="p-4 border-b text-red-500">PER</th>
                        <th class="p-4 border-b text-blue-500">PBR</th>
                        <th class="p-4 border-b">ROE</th>
                        <th class="p-4 border-b">영업이익률</th>
                        <th class="p-4 border-b">부채비율</th>
                        <th class="p-4 border-b">시가총액</th>
                    </tr>
                </thead>
                <tbody id="stock-list">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const listContainer = document.getElementById('stock-list');

        async function loadAndFilterStocks() {
            try {
                // 로딩 메시지 표시
                listContainer.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-gray-500">데이터를 불러오는 중입니다...</td></tr>`;

                // JSON 파일 가져오기
                const response = await fetch('data/stock_data.json');
                if (!response.ok) {
                    throw new Error('데이터를 불러오는데 실패했습니다.');
                }
                const responseData = await response.json();

                // JSON 데이터 구조 대응
                const stockData = responseData.stocks ? responseData.stocks : responseData;
                const generationTime = responseData.generation_time ? responseData.generation_time : "업데이트 중...";

                // 모든 주식을 대상으로 총점(Score) 기준 내림차순 정렬
                stockData.sort((a, b) => b.score - a.score);

                // 스크롤 압박을 줄이기 위해 상위 100위까지만 표출 (가성비 우량주 Top 100)
                const topStocks = stockData.slice(0, 100);

                // 화면에 렌더링
                listContainer.innerHTML = '';

                if (topStocks.length === 0) {
                    listContainer.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-gray-500">조건에 맞는 종목이 없습니다.</td></tr>`;
                    return;
                }

                // 테이블 헤더 위에 설명 업데이트
                document.querySelector('header p').innerHTML = `
                    <span class="text-sm text-gray-500 bg-gray-200 px-3 py-1 rounded-full mb-3 inline-block font-medium">데이터 기준 일시: ${generationTime}</span><br>
                    PER, PBR, ROE, 영업이익률, 부채비율 통합 100점 만점 평가<br>
                    <span class="text-lg text-blue-600 font-bold mt-2 inline-block">🏆 가성비 우량주 종합 랭킹 상위 100선</span>
                `;

                topStocks.forEach((stock, index) => {
                    const formattedPrice = new Intl.NumberFormat('ko-KR').format(stock.price);

                    // 상위 3위, 10위 등 강조 뱃지
                    let badge = "";
                    let rowBg = "hover:bg-gray-50";

                    if (index < 3) {
                        badge = `<span class="ml-2 px-2 py-1 bg-yellow-400 text-yellow-900 text-xs font-bold rounded-full shadow-sm">🏆 Top ${index + 1}</span>`;
                        rowBg = "bg-yellow-50 hover:bg-yellow-100";
                    } else if (index < 10) {
                        badge = `<span class="ml-2 px-2 py-1 bg-red-400 text-white text-xs font-bold rounded-full shadow-sm">Top ${index + 1}</span>`;
                    }

                    const debtDisplay = stock.debt === 999.0 || stock.debt === "N/A" ? "N/A (위험)" : stock.debt.toFixed(2) + "%";

                    const row = `
                        <tr class="${rowBg} transition-colors duration-200">
                            <td class="p-4 border-b text-center font-bold text-gray-500">${index + 1}</td>
                            <td class="p-4 border-b font-medium text-gray-800">
                                <a href="https://finance.naver.com/item/main.naver?code=${stock.code}" target="_blank" class="hover:text-blue-600 hover:underline cursor-pointer" title="네이버 증권에서 보기">
                                    ${stock.name}
                                </a>
                                <span class="text-xs px-2 py-0.5 ml-1 rounded-md ${stock.market === 'KOSPI' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${stock.market}</span>
                                ${badge}
                                <br><span class="text-xs text-gray-400 tracking-tighter">(${stock.code})</span>
                            </td>
                            <td class="p-4 border-b">
                                <span class="text-xl text-purple-700 font-extrabold">${stock.score.toFixed(2)}</span>
                                <span class="text-xs text-gray-500 ml-1">점</span>
                            </td>
                            <td class="p-4 border-b text-gray-700 font-semibold">${formattedPrice}원</td>
                            <td class="p-4 border-b text-red-600 font-semibold">${stock.per.toFixed(2)}</td>
                            <td class="p-4 border-b text-blue-600 font-semibold">${stock.pbr.toFixed(2)}</td>
                            <td class="p-4 border-b text-gray-700">${stock.roe.toFixed(2)}%</td>
                            <td class="p-4 border-b text-gray-700">${stock.opm.toFixed(2)}%</td>
                            <td class="p-4 border-b text-gray-700">${debtDisplay}</td>
                            <td class="p-4 border-b text-sm text-gray-500">${stock.market_cap.toFixed(1)}조</td>
                        </tr>
                    `;
                    listContainer.innerHTML += row;
                });

            } catch (error) {
                console.error('Error fetching stock data:', error);
                listContainer.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500">데이터를 불러오는 중 에러가 발생했습니다. 나중에 다시 시도해주세요.</td></tr>`;
            }
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', loadAndFilterStocks);
    </script>
</body>

</html>
